<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
     <style>
        body{
            font-family: Arial;
            background:white; 
            margin:0;
            padding:20px;
        }

        #header{
            text-align:center;
           
            margin-bottom:20px;
        }

        #form{
            width:800px;
            margin:auto;
            background:#6a5acd;
            border:2px solid #4b3fb3;
            padding:20px;
            color:white;
        }

        .form-group{
            display:flex;
            align-items:center;
            margin-bottom:12px;
        }

        .form-group label{
            width:180px;
            font-size:14px;
        }

        .form-group input,
        .form-group textarea{
            flex:1;
            padding:5px;
            border:1px solid #ccc;
            border-radius:2px;
        }

        textarea{
            height:60px;
        }

        /* radio & checkbox alignment */
        .form-group input[type="radio"],
        .form-group input[type="checkbox"]{
            width:auto;
            margin-left:10px;
        }

        /* Qualification Table */
        #qualification{
            margin-top:20px;
        }

        #qualification label{
            display:block;
            margin-bottom:10px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            color:black;
        }

        table th, table td{
            border:1px solid #ccc;
            padding:6px;
            text-align:center;
        }

        table input{
            width:100%;
            border:none;
            outline:none;
        }

        /* Courses */
        #form > div:nth-last-child(2){
            margin-top:15px;
        }

        /* Buttons */
        #button{
            text-align:center;
            margin-top:20px;
        }

        #button button{
            padding:5px 15px;
            margin:5px;
            border:none;
            background:#ddd;
            cursor:pointer;
        }

        #button button:hover{
            background:#bbb;
        }

    </style>
</head>
<body>
    <div id="header">
        <h2>Student Registration Form</h2>
    </div>
    <div id="form">
        <div class="form-group">
            <label>First Name :</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Last Name :</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Email :</label>
            <input type="email">
        </div>
        <div class="form-group">
            <label>Mobile Number :</label>
            <input type="tel">
        </div>
        <div class="form-group">
            <label>Gender :</label>
            <input type="radio" name ="gender" value="Male">Male
            <input type="radio" name ="gender" value="Female">Female
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea placeholder="Address"></textarea>
        </div>
        <div class="form-group">
            <label>City :</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>PinCode :</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>State :</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Country :</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Hobbies :</label>
            <label>Reading</label>
            <input type="checkbox" name="hobby" value="Reading">
            <label>Drawing</label>
            <input type="checkbox" name="hobby" value="Drawing">
            <label>Dancing</label>
            <input type="checkbox" name="hobby" value="Dancing">
            <label>Sketching</label>
            <input type="checkbox" name="hobby" value="Sketching">
            <label>Others</label>
            <input type="text">
        </div>
        <div id="qualification">
            <label>Qualification </label>
            <table>
                <tr>
                    <th>Sr No. </th>
                    <th>Examination</th>
                    <th>Borad</th>
                    <th>Percentage</th>
                    <th>Year of Passing</th>
                </tr>
                <tr>
                    <td>1  </td>
                    <td>Class X</td>
                    <td><input type="text" name="board" ></td>
                    <td><input type="text" name="percentage" ></td>
                    <td><input type="text" name="yearOfPassing"></td>
                </tr>
                <tr>
                    <td>2  </td>
                    <td>Class XII</td>
                    <td><input type="text" name="board" ></td>
                    <td><input type="text" name="percentage" ></td>
                    <td><input type="text" name="yearOfPassing" ></td>
                </tr>
                <tr>
                    <td>3  </td>
                    <td>Graduation</td>
                    <td><input type="text" name="board" ></td>
                    <td><input type="text" name="percentage"></td>
                    <td><input type="text" name="yearOfPassing" ></td>
                </tr>
                <tr>
                    <td>4  </td>
                    <td>Masters</td>
                    <td><input type="text" name="board" ></td>
                    <td><input type="text" name="percentage" ></td>
                    <td><input type="text" name="yearOfPassing" ></td>
                </tr>
            </table>

        </div>
        <div>
            <label> Courses Applied For </label>
            <label>BCA</label>
            <input type="radio" name="degree">
            <label>B.Com</label>
            <input type="radio" name="degree">
            <label>B.Sc</label>
            <input type="radio" name="degree">
            <label>B.A.</label>
            <input type="radio" name="degree">
        </div>
        <div id="button">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
       

        </div>
    </div>

</body>
</html>
