<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:#f5f5f5;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card Container */
body > div:nth-child(2){
    width:350px;
    background:white;
    padding:40px 30px;
    border:2px solid #4a90e2;
    border-radius:5px;
    text-align:center;
}

/* Heading */
#header{
    position:absolute;
    top:80px;
    text-align:center;
    width:100%;
}

#header h1{
    font-size:40px;
    margin-bottom:20px;
}

/* Form fields */
.form-group{
    margin-bottom:25px;
}

.form-group input{
    width:100%;
    border:none;
    border-bottom:2px solid #999;
    padding:8px 5px;
    font-size:14px;
    outline:none;
    background:transparent;
}

/* Focus effect */
.form-group input:focus{
    border-bottom:2px solid #4a90e2;
}

/* Login text */
div span{
    font-size:13px;
}

div a{
    text-decoration:none;
    font-weight:bold;
    color:black;
}

/* Button */
button{
    width:100%;
    padding:10px;
    background:black;
    color:white;
    border:none;
    margin-top:20px;
    cursor:pointer;
}

button:hover{
    background:#333;
}
</style>
</head>
<body>
    <div id="header">
        <h1>Sign Up</h1>
    </div>
    <div>
        <div class="form-group">
            <input type="text" placeholder="First Name">
        </div>
        <div class="form-group">
            <input type="text" placeholder="Last Name">
        </div>
        <div class="form-group">
            <input type="email" placeholder="Email">
        </div>
        <div class="form-group">
            <input type="password" placeholder="Password">
        </div>
        <div>
            <span>Already a member? <span><a href="#">Log In</a> </span></span>
        </div>
        <div>
            <button>Sign Up</button>
        </div>

    </div>

</body>
</html>
