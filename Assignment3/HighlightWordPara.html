<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlight Word Para</title>
</head>
<body>
    <p id="para">
        <b>We</b> have just started <b>this</b> section for the users (<b>begineer</b> to intermediate) who
        <b>want</b> to work with <b>various</b> JavaScript <b>problems</b> and write scripts online to <b>test</b> their JavaScript <b>skill</b>
    </p>

    <script>
        const para = document.getElementById("para");
        const boldWords = document.getElementsByTagName("b");

        for(let i = 0; i < boldWords.length ; i++){
            boldWords[i].style.visibility = "hidden";
        }
        para.addEventListener("mouseenter", function () {
            for(let i = 0; i < boldWords.length; i++) {
                boldWords[i].style.visibility = "visible";
                boldWords[i].style.color = "green";
            }
        });

    
        para.addEventListener("mouseleave", function () {
            for (let i = 0; i < boldWords.length; i++) {
                boldWords[i].style.visibility = "hidden";
            }
        });


    </script>
    
</body>
</html>
