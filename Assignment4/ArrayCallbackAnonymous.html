<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Callback Anonymous Function</title>
</head>
<body>
    <script>
        const array=[1,2,3,4,5];
        array.forEach((value,index)=>{
            value = value*2;
            console.log(value);
        });
    </script>
</body>
</html>
