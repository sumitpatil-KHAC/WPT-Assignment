<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch data chaining</title>
</head>
<body>
    <script>
    function fetchData(url, callback) {
        console.log("Fetching data:", url);

        setTimeout(() => {
            let isError = false;

            if (isError) {
                callback("Error: Failed to fetch data", null);
            } else {
                let response = "Data received from: " + url;
                callback(null, response);
            }
        }, 2000);
    }

    function processData(data, callback) {
        console.log("Processing data...");

        setTimeout(() => {
            let processed = data.toUpperCase();
            callback(processed);
        }, 1000);
    }

    
    fetchData("https://jsonplaceholder.typicode.com/users", function(error, data) {
        if (error) {
            console.log(error);
        } else {
            processData(data, function(result) {
                console.log("Processed Data:", result);
            });
        }
    });
</script>
</body>
</html>
